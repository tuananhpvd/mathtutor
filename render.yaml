# render.yaml — Infrastructure as Code cho hạ tầng Render hiện tại (mathtutor / mathtutor-1 /
# mathtutor-db). MỤC ĐÍCH: tài liệu hóa + tái lập được cấu hình nếu cần dựng lại từ đầu.
#
# ⚠️ QUAN TRỌNG — ĐỌC TRƯỚC KHI DÙNG:
# File này KHÔNG tự động áp dụng lên các service đang chạy. 3 service hiện tại
# (mathtutor, mathtutor-1, mathtutor-db) được tạo THỦ CÔNG trên dashboard, không qua
# Blueprint — thêm file này vào repo KHÔNG làm thay đổi gì tới chúng.
# Muốn dùng file này để đồng bộ (Render → Blueprint → New Blueprint Instance), PHẢI:
#   1. Điền lại các giá trị "<TODO: ...>" bên dưới cho đúng thực tế trên dashboard.
#   2. Hiểu rằng Blueprint sync có thể tạo/sửa/xóa service để khớp file này — CHỈ bật
#      sau khi đã kiểm tra kỹ, tốt nhất là thử trên workspace/nhánh riêng trước.
#   3. mathtutor có Persistent Disk chứa backend/uploads/ — disk KHÔNG được định nghĩa
#      lại qua Blueprint sync nếu đã tồn tại; xác nhận với Render support/docs trước khi
#      áp dụng để không mất ảnh đã upload.

services:
  - type: web
    name: mathtutor
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -e ".[llm,dev]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: mathtutor-db
          property: connectionString
      - key: JWT_SECRET
        sync: false # đặt thủ công trên dashboard — KHÔNG commit giá trị thật vào repo
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "480"
      - key: LLM_PROVIDER
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: LLM_TEMPERATURE
        value: "0.2"
      - key: CORS_EXTRA_ORIGINS
        sync: false # "<TODO: URL thật của mathtutor-1, vd https://mathtutor-1.onrender.com>"
    disk:
      name: uploads
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1

  - type: web
    name: mathtutor-1
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SENTRY_DSN
        sync: false # tùy chọn — để trống = Sentry không bật gì. Xem frontend/.env.example.
    routes:
      # "<TODO: thay bằng URL thật của service mathtutor ở trên>"
      - type: rewrite
        source: /api/*
        destination: https://mathtutor.onrender.com/api/*
      - type: rewrite
        source: /uploads/*
        destination: https://mathtutor.onrender.com/uploads/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: mathtutor-db
    plan: basic
    databaseName: mathtutor
    user: mathtutor
